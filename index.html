<!DOCTYPE html>
<html>
<head>

<title>Moon Wheel Test</title>

<script src="https://cdn.jsdelivr.net/npm/p5@1.9.0/lib/p5.min.js"></script>

<style>

body{
background:#0a0a14;
color:#e8e3c8;
font-family:serif;
text-align:center;
}

#info{
margin-top:10px;
border:1px solid #444;
display:inline-block;
padding:10px;
background:#111;
}

.slider{
width:60%;
margin-top:10px;
}

</style>
</head>

<body>

<h2>Moon Wheel Test</h2>

<p>Day: <span id="dayLabel">0</span></p>

<input id="timeSlider" class="slider" type="range" min="0" max="359" value="0">

<div id="info"></div>

<script>

let day = 0

const moons = [

{
name:"Moon 1",
cycle:15,
orbit:120
},

{
name:"Moon 2",
cycle:30,
orbit:170
},

{
name:"Moon 3",
cycle:60,
orbit:220
}

]

function setup(){
createCanvas(600,600)
angleMode(DEGREES)
}

function draw(){

background(10,10,20)

translate(width/2,height/2)

drawCalendarWheel()

drawRings()

drawPlanet()

let infoHTML = ""

moons.forEach(m=>{
let result = drawMoon(m)
infoHTML += `
<div>
${m.name} — <b>${result.phase}</b> (position ${result.position})
</div>
`
})

document.getElementById("info").innerHTML = infoHTML

}

function drawPlanet(){

noStroke()
fill(220,200,140)
circle(0,0,40)

}

function drawRings(){

noFill()
stroke(80)

moons.forEach(m=>{
circle(0,0,m.orbit*2)
})

}

function drawMoon(m){

let angle = (day % m.cycle) / m.cycle * 360

let x = cos(angle) * m.orbit
let y = sin(angle) * m.orbit

let position = Math.floor(angle / 6)

let phase = getPhase(angle)

drawPhaseMoon(x,y,angle)

return {phase, position}

}

function drawPhaseMoon(x,y,angle){

push()

translate(x,y)

fill(230)
circle(0,0,20)

let phaseAngle = map(angle,0,360,-180,180)

fill(15)
arc(0,0,20,20,90+phaseAngle,270+phaseAngle)

pop()

}

function drawCalendarWheel(){

let radius = 260

stroke(90)
noFill()
circle(0,0,radius*2)

for(let i=0;i<360;i++){

let angle = i

let x1 = cos(angle)*radius
let y1 = sin(angle)*radius

let x2 = cos(angle)*(radius+10)
let y2 = sin(angle)*(radius+10)

stroke(120)

line(x1,y1,x2,y2)

}

}

function getPhase(angle){

if(angle < 22.5 || angle >= 337.5)
return "New"

if(angle < 157.5)
return "Waxing"

if(angle < 202.5)
return "Full"

if(angle < 337.5)
return "Waning"

}

document.getElementById("timeSlider").addEventListener("input",e=>{

day = parseInt(e.target.value)

document.getElementById("dayLabel").innerText = day

})

</script>

</body>
</html>
